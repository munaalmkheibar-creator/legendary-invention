cat <<EOF > ~/CharityProject/index.html
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة سنابل الخير</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; text-align: center; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 10px; max-width: 400px; margin: auto; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { background-color: #28a745; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; width: 100%; }
    </style>
</head>
<body>
    <div class="container">
        <h2>منصة سنابل الخير</h2>
        <p>يرجى إدخال البيانات لتسجيل طلب المساعدة</p>
        <form action="/" method="post" enctype="multipart/form-data">
            <input type="text" name="name" placeholder="الاسم الكامل" required>
            <input type="tel" name="phone" placeholder="رقم الهاتف" required>
            <p>ارفع صورة الهوية أو المستند:</p>
            <input type="file" name="id_image" accept="image/*" required>
            <button type="submit">إرسال الطلب</button>
        </form>
    </div>
</body>
</html>
EOF
